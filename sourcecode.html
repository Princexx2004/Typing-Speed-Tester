<!-- Typing Speed Tester-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Typing Speed Tester</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex items-center justify-center p-6" style="background-image: url('bg.jpg');">
  <div class="w-full max-w-4xl bg-gray-800 p-8 rounded-2xl shadow-lg">
    <h1 class="text-3xl font-bold mb-6 text-center">Typing Speed Tester</h1>

    <div class="flex justify-center mb-4 space-x-4">
      <button class="time-btn px-4 py-2 bg-yellow-500 text-black rounded-lg font-semibold hover:bg-yellow-400" data-time="60">1 Minute</button>
      <button class="time-btn px-4 py-2 bg-yellow-500 text-black rounded-lg font-semibold hover:bg-yellow-400" data-time="120">2 Minutes</button>
      <button class="time-btn px-4 py-2 bg-yellow-500 text-black rounded-lg font-semibold hover:bg-yellow-400" data-time="300">5 Minutes</button>
    </div>

    <div class="bg-gray-700 p-6 rounded-xl text-lg text-yellow-100 mb-4 min-h-[120px]" id="quote-box"></div>

    <textarea id="input" placeholder="Start typing here..." rows="5"
      class="w-full p-4 text-lg bg-gray-900 text-white border-2 border-gray-600 rounded-lg focus:outline-none focus:border-yellow-400 resize-none" disabled></textarea>

    <div class="flex justify-between mt-6 text-sm md:text-base">
      <div>Time Left: <span id="time">0</span>s</div>
      <div>WPM: <span id="wpm">0</span></div>
      <div>Accuracy: <span id="accuracy">100</span>%</div>
      <div>Characters: <span id="chars">0</span></div>
    </div>

    <div class="mt-6 text-center">
      <button id="restart"
        class="px-6 py-2 bg-yellow-500 text-black font-semibold rounded-full hover:bg-yellow-400 transition duration-300">
        Restart
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
